<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span onClick="{{ onClick }}" title="{{ title }}" style="box-sizing:border-box; display:inline-flex; align-items:center; justify-content:center; white-space:nowrap; font-family:var(--font-ui); height:{{ h }}; padding:{{ pad }}; font-size:{{ fs }}; font-weight:{{ weight }}; background:{{ bg }}; color:{{ col }}; border:{{ border }}; border-radius:{{ radius }}; cursor:{{ cursor }};">{{ children }}</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:150,&quot;height&quot;:44},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;secondary&quot;,&quot;options&quot;:[&quot;primary&quot;,&quot;secondary&quot;,&quot;review&quot;,&quot;danger&quot;,&quot;quiet&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;sm&quot;,&quot;options&quot;:[&quot;sm&quot;,&quot;md&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;onClick&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const V = {
      primary:   { bg:'#f4bc41',     col:'#2a2a2a', border:'1px solid #c79320', weight:'500', radius:'0' },
      secondary: { bg:'#9c9c9c',     col:'#2a2a2a', border:'1px solid #6f6f6f', weight:'400', radius:'0' },
      review:    { bg:'#836ddd',     col:'#ffffff', border:'none',              weight:'500', radius:'0' },
      danger:    { bg:'#e0584c',     col:'#ffffff', border:'1px solid #b03d33', weight:'500', radius:'0' },
      quiet:     { bg:'transparent', col:'#565656', border:'1px solid #6f6f6f', weight:'400', radius:'0' },
    };
    const v = V[p.variant] || V.secondary;
    const S = { sm:{ h:'20px', pad:'0 9px', fs:'12px' }, md:{ h:'22px', pad:'0 12px', fs:'12px' } };
    const s = S[p.size] || S.sm;
    const small = (p.variant === 'quiet' || p.variant === 'danger');
    return {
      children: p.children, onClick: p.onClick, title: p.title || '',
      bg: v.bg, col: v.col, border: v.border, weight: v.weight, radius: v.radius,
      h: s.h, pad: small ? '0 8px' : s.pad, fs: small ? '11px' : s.fs,
      cursor: p.cursor || 'pointer',
    };
  }
}
</script>
</body>
</html>
