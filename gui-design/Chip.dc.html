<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<span style="display:inline-flex; align-items:center; font-family:var(--font-mono); font-size:10px; font-weight:500; padding:1px 5px; border-radius:2px; background:{{ bg }}; color:{{ fg }}; white-space:nowrap; letter-spacing:0.02em;">{{ children }}</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 80, &quot;height&quot;: 20 },
  &quot;role&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;impl&quot;, &quot;qa&quot;], &quot;default&quot;: &quot;impl&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const label = this.props.children || this.props.role || '';
    const bg = this.props.bg || '#404040';
    const fg = this.props.fg || this.props.color || '#cfcfcf';
    return { bg, fg, children: label };
  }
}
</script>
</body>
</html>
