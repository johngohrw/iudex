<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="font-size:10px; letter-spacing:0.08em; color:{{ col }}; padding:{{ pad }}; border-bottom:{{ bb }}; border-top:{{ bt }};">{{ children }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:26},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;pad&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;borderTop&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;noBorder&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    const dark = p.tone === 'dark';
    const bc = dark ? '#14171d' : '#6f6f6f';
    return {
      col:      dark ? '#8a8f99' : '#3a3a3a',
      pad:      p.pad || (dark ? '11px 11px 5px' : '8px 11px 5px'),
      bb:       p.noBorder ? 'none' : `1px solid ${bc}`,
      bt:       p.borderTop ? `1px solid ${bc}` : 'none',
      children: p.children,
    };
  }
}
</script>
</body>
</html>
