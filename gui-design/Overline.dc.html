<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="font-size:10px; letter-spacing:0.08em; color:{{ col }}; margin-top:{{ mt }}; margin-bottom:{{ mb }};">{{ children }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:180,&quot;height&quot;:16},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;mb&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;6px&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    return {
      col: p.tone === 'dark' ? '#8a8f99' : '#565656',
      mt: p.mt || '0',
      mb: p.mb || '6px',
      children: p.children,
    };
  }
}
</script>
</body>
</html>
