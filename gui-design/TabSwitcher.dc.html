<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; background:#929292; border:1px solid #6f6f6f; padding:1px;">
  <sc-for list="{{ tabs }}" as="tab" hint-placeholder-count="2">
    <span onClick="{{ tab.onClick }}" style="padding:1px 11px; border-radius:3px; cursor:pointer; font-size:{{ fontSize }}; background:{{ tab.bg }}; color:{{ tab.color }};">{{ tab.label }}</span>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 140, &quot;height&quot;: 24 },
  &quot;tabs&quot;: { &quot;editor&quot;: null, &quot;default&quot;: &quot;Table,Graph&quot; },
  &quot;value&quot;: { &quot;editor&quot;: null, &quot;default&quot;: &quot;Table&quot; }
}">
class Component extends DCLogic {
  renderVals() {
    const raw = this.props.tabs || '';
    const list = Array.isArray(raw) ? raw : raw.split(',').map(s => s.trim()).filter(Boolean);
    const value = this.props.value || list[0] || '';
    const fontSize = this.props.fontSize || '12px';
    const tabs = list.map(label => ({
      label,
      bg: label === value ? '#dadada' : 'transparent',
      color: label === value ? '#2a2a2a' : '#565656',
      onClick: () => this.props.onChange && this.props.onChange(label),
    }));
    return { tabs, fontSize };
  }
}
</script>
</body>
</html>
