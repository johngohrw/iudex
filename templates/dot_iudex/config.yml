# iudex workspace configuration
#
# This file lives at .iudex/config.yml. It is local operational state and is
# gitignored along with the rest of .iudex/.

# Canonical branch all finished tickets merge into. iudex init sets this to the
# repo's current branch at init time.
main_branch: main

# Maximum number of tickets allowed in the "active" state at once. `iudex
# activate` refuses once this cap is reached.
max_active: 4

# Number of QA rejections (`iudex qa reject`) a ticket may accumulate before it
# is moved to "failed" for human intervention. Reset by `iudex retry`.
qa_reject_limit: 3

# NOTE: the agent-command pool (agent_commands / agent_roles) is machine-level
# and lives in ~/.iudex/config.yml, shared across all workspaces — not here.
# `iudex spawn` / `iudex agent-command` resolve it from there.

# How `iudex human-qa approve` lands a ticket on main_branch: "no-ff" | "squash".
merge_strategy: no-ff

# Commit message for the merge. {{.Ticket}} is substituted with the ticket id.
merge_message_template: "feat: complete {{.Ticket}}"

# Prefix for per-ticket work branches, e.g. work/t5.
branch_prefix: "work/"
